# Cargo config kept intentionally minimal so cross-platform builds (macOS,
# Linux) aren't polluted by Windows-MSVC/CUDA env vars. The CMake/CUDA
# environment that whisper.cpp needs on Windows + CUDA 13.x is set in
# scripts/build-sidecars.ps1 right before invoking cargo. The Mac build
# (Metal sidecar) doesn't need any extra env — Metal headers ship with
# the macOS SDK.
